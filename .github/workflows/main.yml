name: Close Jira Ticket on Issue Close

on:
  issues:
    types: [closed]

jobs:
  close-jira-ticket:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira Issue Key
        id: extract
        run: |
          TITLE="${{ github.event.issue.title }}"
          # Extract JP-XX format from title
          ISSUE_KEY=$(echo "$TITLE" | grep -oP 'JP-\d+' | head -1)
          
          if [ -z "$ISSUE_KEY" ]; then
            echo "No Jira issue key found in title"
            exit 0
          fi
          
          echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT
          echo "Found Jira issue: $ISSUE_KEY"

      - name: Trigger Jira Automation
        if: steps.extract.outputs.issue_key != ''
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "X-Automation-Webhook-Token: ${{ secrets.JIRA_WEBHOOK_SECRET }}" \
            -d '{
              "action": "closed",
              "issueKey": "${{ steps.extract.outputs.issue_key }}"
            }' \
            ${{ secrets.JIRA_WEBHOOK_URL }}
