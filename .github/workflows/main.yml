name: Sync Jira on Issue Close

on:
  issues:
    types: [closed]

jobs:
  update-jira:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jira Automation
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "secret": "${{ secrets.JIRA_WEBHOOK_SECRET }}",
              "action": "closed",
              "issue": {
                "number": "${{ github.event.issue.number }}",
                "title": "${{ github.event.issue.title }}"
              }
            }' \
            https://api-private.atlassian.com/automation/webhooks/jira/a/bf5dcae3-b9b7-45d6-9b6d-6610e7d738b7/019bf367-0cb9-79d6-8b70-99e10d05de26)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"
          
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Failed to trigger Jira automation"
            exit 1
          fi
